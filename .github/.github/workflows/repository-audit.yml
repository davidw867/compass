name: Repository Compliance Audit

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  repository-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify Python
        run: python --version

      - name: Run Repository Compliance Audit
        run: python tools/audit-repository.py
